services:
  - type: web
    name: portal-web
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python manage.py seed_db && gunicorn 'app:create_app()'"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
