version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=development
      - FLASK_DEBUG=1
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-portal_zio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ZI0T1KIB0T}
      POSTGRES_DB: ${POSTGRES_DB:-portal_db}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portal_zio} -d ${POSTGRES_DB:-portal_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
