<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZIO Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% if request.path == '/' %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/portfolio.css') }}">
    {% endif %}
    <link rel="icon" href="{{ url_for('static', filename='img/icon.png') }}" type="image/x-icon">
</head>

<body>
    {% if request.path not in ['/login', '/'] %}
    <nav class="navbar glass-panel">
        <a href="{{ url_for('frontend.dashboard') }}" class="navbar-brand"><img
                src="{{ url_for('static', filename='img/logo.svg') }}"><p>ZIO Portal</p></a>
        <div class="nav-links">
            <a href="{{ url_for('frontend.dashboard') }}">Panel</a>
            <a href="{{ url_for('frontend.user_profile', user_id=user.id) }}">Mi Perfil</a>
            <a href="{{ url_for('frontend.logout') }}">Cerrar Sesión</a>
        </div>
    </nav>
    {% endif %}

    <main class="{% if request.path != '/' %}container{% endif %}">
        {% block content %}{% endblock %}
    </main>

    <script>
        // Función global para mostrar errores
        function showError(message) {
            const container = document.getElementById('error-container');
            if (container) {
                container.innerHTML = `<div class="alert">${message}</div>`;
            }
        }
    </script>
    {% block scripts %}{% endblock %}
</body>

</html>
