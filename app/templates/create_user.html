{% extends "base.html" %}

{% block content %}
<div class="center-container">
    <div class="auth-form glass-panel" style="max-width: 500px;">
        <h2>Crear Nuevo Usuario</h2>

        <form id="createUserForm">
            <div class="input-group">
                <label for="name">Nombre Completo</label>
                <input type="text" id="name" name="name" required placeholder="Ej: Juan Pérez">
            </div>

            <div class="input-group">
                <label for="document_number">Número de Documento</label>
                <input type="text" id="document_number" name="document_number" required placeholder="123456789">
            </div>

            <div class="input-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" required placeholder="correo@ejemplo.com">
            </div>

            <div class="input-group">
                <label for="phone">Teléfono</label>
                <input type="text" id="phone" name="phone" placeholder="Opcional">
            </div>

            <div class="input-group">
                <label for="role_name">Rol del Usuario</label>
                <select id="role_name" name="role_name" required
                    style="width: 100%; padding: 0.75rem 1rem; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: #fff; font-size: 1rem;">
                    <option value="" disabled selected>Selecciona un rol</option>
                    {% for r in roles %}
                    <option value="{{ r.name }}">{{ r.name|capitalize }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="input-group">
                <label for="password">Contraseña Provisional</label>
                <input type="password" id="password" name="password" required placeholder="Mínimo 6 caracteres">
            </div>

            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <a href="{{ url_for('frontend.dashboard') }}" class="btn btn-danger"
                    style="flex: 1; display: inline-flex; align-items: center; justify-content: center;">Cancelar</a>
                <button type="submit" class="btn btn-primary" style="flex: 1;">Crear Usuario</button>
            </div>
        </form>
        <div id="error-container"></div>
        <div id="success-container"></div>
    </div>
</div>

<dialog id="responseModal" class="custom-modal glass-panel">
    <div class="modal-content" id="modalContent">
        <h3 id="modalTitle">Título</h3>
        <p id="modalMessage">Mensaje</p>
        <button type="button" class="btn btn-primary"
            onclick="document.getElementById('responseModal').close()">Aceptar</button>
    </div>
</dialog>
{% endblock %}

{% block scripts %}
<script>
    function showModal(title, message, type) {
        const modal = document.getElementById('responseModal');
        const modalContent = document.getElementById('modalContent');
        document.getElementById('modalTitle').textContent = title;
        document.getElementById('modalMessage').textContent = message;

        modalContent.className = 'modal-content ' + (type === 'success' ? 'modal-success' : 'modal-error');
        modal.showModal();
    }

    document.getElementById('createUserForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const form = e.target;
        const submitBtn = form.querySelector('button[type="submit"]');
        const originalBtnText = submitBtn.textContent;

        // Bloquear botón y mostrar carga
        submitBtn.disabled = true;
        submitBtn.textContent = 'Procesando...';

        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());

        try {
            const response = await fetch('/api/users/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                showModal('¡Éxito!', 'Usuario creado exitosamente', 'success');
                form.reset(); // Limpiar formulario
            } else {
                const error = await response.json();
                showModal('Error', error.msg || 'Error al crear usuario', 'error');
            }
        } catch (err) {
            showModal('Error', 'Error de conexión con el servidor.', 'error');
        } finally {
            // Restaurar estado original del botón
            submitBtn.disabled = false;
            submitBtn.textContent = originalBtnText;
        }
    });
</script>
{% endblock %}
