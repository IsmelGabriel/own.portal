{% extends "base.html" %}

{% block content %}
<div class="center-container">
    <div class="auth-form glass-panel">
        <h2>Bienvenido a ZIO</h2>
        <div id="error-container"></div>

        <form id="loginForm">
            <div class="input-group">
                <label for="document_number">Número de Documento</label>
                <input type="text" id="document_number" name="document_number" required
                    placeholder="Ingresa tu documento">
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn btn-primary" style="margin-bottom: 1rem;">Iniciar Sesión</button>
            <a href="{{ url_for('frontend.index') }}" class="btn" style="border: 1px solid var(--border-color); color: var(--text-color);">Continuar como Invitado</a>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const form = e.target;
        const submitBtn = form.querySelector('button[type="submit"]');
        const originalBtnText = submitBtn.textContent;

        // Mostrar estado de carga y bloquear el botón
        submitBtn.disabled = true;
        submitBtn.textContent = 'Procesando...';

        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());

        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                // El backend ya estableció la cookie JWT
                window.location.href = '/dashboard';
                // No habilitamos el botón aquí para evitar acciones mientras se redirige
            } else {
                const error = await response.json();
                showError(error.msg || 'Credenciales inválidas');

                // Restaurar estado original del botón
                submitBtn.disabled = false;
                submitBtn.textContent = originalBtnText;
            }
        } catch (err) {
            showError('Error de conexión con el servidor.');

            // Restaurar estado original del botón
            submitBtn.disabled = false;
            submitBtn.textContent = originalBtnText;
        }
    });
</script>
{% endblock %}
